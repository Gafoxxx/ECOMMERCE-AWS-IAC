AWSTemplateFormatVersion: '2010-09-09'
Description: 'Fase 4: Computo, Auto Scaling y Application Load Balancer'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    Description: "Usa la ultima AMI de Amazon Linux 2023"
  GitHubRepoUrl:
    Type: String
    Description: "URL de tu repositorio de GitHub"
    Default: "https://github.com/Gafoxxx/ECOMMERCE-AWS-IAC"
  GitHubBranch:
    Type: String
    Default: main
    Description: "Rama del repositorio que clonaran las instancias EC2"
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: "Debe ser la misma contraseña usada al crear el stack de RDS"
  JWTSecret:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: "Secreto para firmar los tokens JWT de la aplicacion"
  AppBaseUrl:
    Type: String
    Default: "http://localhost:3000"
    Description: "URL publica base alternativa. Solo se usa si UseCloudFrontBaseUrl=false"
  UseCloudFrontBaseUrl:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Usa automaticamente la URL HTTPS de CloudFront como APP_BASE_URL"
  MercadoPagoAccessToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Access token de Mercado Pago Checkout Pro"
  MercadoPagoPublicKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Public key de Mercado Pago Checkout Pro"
  MercadoPagoWebhookUrl:
    Type: String
    Default: ""
    Description: "URL HTTPS opcional para Webhooks de Mercado Pago"
  PaymentDebugErrors:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Devuelve detalles sanitizados de errores de Mercado Pago para diagnostico temporal"

Conditions:
  UseCloudFrontBaseUrlCondition: !Equals [ !Ref UseCloudFrontBaseUrl, "true" ]

Resources:
  # 1. Grupos de Seguridad
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Permitir HTTP desde Internet al ALB"
      VpcId: !ImportValue Ecommerce-VPC-ID
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebFromALBIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue Ecommerce-App-SG-ID
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref ALBSecurityGroup

  # 2. Target Group (A donde el ALB enviara el trafico)
  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: Ecommerce-TG
      Port: 3000
      Protocol: HTTP
      VpcId: !ImportValue Ecommerce-VPC-ID
      HealthCheckPath: "/health"
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: "200"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2

  # 3. Application Load Balancer (ALB)
  WebAppALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: Ecommerce-ALB
      Subnets: !Split [ ",", !ImportValue Ecommerce-Public-Subnets ]
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Scheme: internet-facing

  # 4. Listener del ALB
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebAppALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup

  WebAppCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: "HTTPS endpoint for Ecommerce ALB"
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        IPV6Enabled: true
        Origins:
          - Id: EcommerceALBOrigin
            DomainName: !GetAtt WebAppALB.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: EcommerceALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          Compress: false
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # 5. Instancias EC2 directas para compatibilidad con sandboxes sin Auto Scaling
  WebAppInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      SubnetId: !Select [ 0, !Split [ ",", !ImportValue Ecommerce-Private-Subnets ] ]
      SecurityGroupIds:
        - !ImportValue Ecommerce-App-SG-ID
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            yum update -y
            # Instalar Node.js y Git
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs git
            npm install -g pm2

            # Moverse al directorio del usuario y clonar repo
            cd /home/ec2-user
            git clone --branch ${GitHubBranch} --single-branch ${GitHubRepoUrl} repo
            cd repo/app

            # Crear variables de entorno dinamicamente
            cat <<EOT >> .env
            DB_NAME=${DBName}
            DB_USER=${DBUser}
            DB_PASSWORD=${DBPassword}
            DB_HOST=${DBHost}
            JWT_SECRET=${JWTSecret}
            APP_BASE_URL=${AppBaseUrlValue}
            MERCADOPAGO_ACCESS_TOKEN=${MercadoPagoAccessToken}
            MERCADOPAGO_PUBLIC_KEY=${MercadoPagoPublicKey}
            MERCADOPAGO_WEBHOOK_URL=${MercadoPagoWebhookUrl}
            PAYMENT_DEBUG_ERRORS=${PaymentDebugErrors}
            PORT=3000
            EOT

            # Instalar dependencias y arrancar
            npm install
            pm2 start index.js
            pm2 save
            pm2 startup
          - DBHost: !ImportValue Ecommerce-DB-Endpoint
            DBName: !ImportValue Ecommerce-DB-Name
            DBUser: !ImportValue Ecommerce-DB-Username
            DBPassword: !Ref DBPassword
            JWTSecret: !Ref JWTSecret
            AppBaseUrlValue: !If
              - UseCloudFrontBaseUrlCondition
              - !Join [ "", [ "https://", !GetAtt WebAppCloudFrontDistribution.DomainName ] ]
              - !Ref AppBaseUrl
            MercadoPagoAccessToken: !Ref MercadoPagoAccessToken
            MercadoPagoPublicKey: !Ref MercadoPagoPublicKey
            MercadoPagoWebhookUrl: !Ref MercadoPagoWebhookUrl
            PaymentDebugErrors: !Ref PaymentDebugErrors
            GitHubRepoUrl: !Ref GitHubRepoUrl
            GitHubBranch: !Ref GitHubBranch
      Tags:
        - Key: Name
          Value: Ecommerce-EC2-Instance-1
        - Key: Project
          Value: Ecommerce-AWS-IAC

  WebAppInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      SubnetId: !Select [ 1, !Split [ ",", !ImportValue Ecommerce-Private-Subnets ] ]
      SecurityGroupIds:
        - !ImportValue Ecommerce-App-SG-ID
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            yum update -y
            # Instalar Node.js y Git
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs git
            npm install -g pm2

            # Moverse al directorio del usuario y clonar repo
            cd /home/ec2-user
            git clone --branch ${GitHubBranch} --single-branch ${GitHubRepoUrl} repo
            cd repo/app

            # Crear variables de entorno dinamicamente
            cat <<EOT >> .env
            DB_NAME=${DBName}
            DB_USER=${DBUser}
            DB_PASSWORD=${DBPassword}
            DB_HOST=${DBHost}
            JWT_SECRET=${JWTSecret}
            APP_BASE_URL=${AppBaseUrlValue}
            MERCADOPAGO_ACCESS_TOKEN=${MercadoPagoAccessToken}
            MERCADOPAGO_PUBLIC_KEY=${MercadoPagoPublicKey}
            MERCADOPAGO_WEBHOOK_URL=${MercadoPagoWebhookUrl}
            PAYMENT_DEBUG_ERRORS=${PaymentDebugErrors}
            PORT=3000
            EOT

            # Instalar dependencias y arrancar
            npm install
            pm2 start index.js
            pm2 save
            pm2 startup
          - DBHost: !ImportValue Ecommerce-DB-Endpoint
            DBName: !ImportValue Ecommerce-DB-Name
            DBUser: !ImportValue Ecommerce-DB-Username
            DBPassword: !Ref DBPassword
            JWTSecret: !Ref JWTSecret
            AppBaseUrlValue: !If
              - UseCloudFrontBaseUrlCondition
              - !Join [ "", [ "https://", !GetAtt WebAppCloudFrontDistribution.DomainName ] ]
              - !Ref AppBaseUrl
            MercadoPagoAccessToken: !Ref MercadoPagoAccessToken
            MercadoPagoPublicKey: !Ref MercadoPagoPublicKey
            MercadoPagoWebhookUrl: !Ref MercadoPagoWebhookUrl
            PaymentDebugErrors: !Ref PaymentDebugErrors
            GitHubRepoUrl: !Ref GitHubRepoUrl
            GitHubBranch: !Ref GitHubBranch
      Tags:
        - Key: Name
          Value: Ecommerce-EC2-Instance-2
        - Key: Project
          Value: Ecommerce-AWS-IAC

  WebAppTargetAttachment1:
    Type: AWS::ElasticLoadBalancingV2::TargetGroupAttachment
    Properties:
      TargetGroupArn: !Ref WebAppTargetGroup
      TargetId: !Ref WebAppInstance1
      Port: 3000

  WebAppTargetAttachment2:
    Type: AWS::ElasticLoadBalancingV2::TargetGroupAttachment
    Properties:
      TargetGroupArn: !Ref WebAppTargetGroup
      TargetId: !Ref WebAppInstance2
      Port: 3000

Outputs:
  ALBUrl:
    Description: "URL publica de tu E-commerce"
    Value: !Join [ "", [ "http://", !GetAtt WebAppALB.DNSName ] ]
    Export:
      Name: Ecommerce-ALB-URL
  CloudFrontUrl:
    Description: "URL HTTPS publica de tu E-commerce via CloudFront"
    Value: !Join [ "", [ "https://", !GetAtt WebAppCloudFrontDistribution.DomainName ] ]
    Export:
      Name: Ecommerce-CloudFront-URL
  CloudFrontDistributionId:
    Description: "ID de la distribucion CloudFront"
    Value: !Ref WebAppCloudFrontDistribution
    Export:
      Name: Ecommerce-CloudFront-Distribution-ID
  AppBaseUrlUsed:
    Description: "APP_BASE_URL aplicado a las instancias nuevas"
    Value: !If
      - UseCloudFrontBaseUrlCondition
      - !Join [ "", [ "https://", !GetAtt WebAppCloudFrontDistribution.DomainName ] ]
      - !Ref AppBaseUrl
    Export:
      Name: Ecommerce-App-Base-URL
  ALBFullName:
    Description: "Nombre completo del ALB para metricas CloudWatch"
    Value: !GetAtt WebAppALB.LoadBalancerFullName
    Export:
      Name: Ecommerce-ALB-FullName
  TargetGroupFullName:
    Description: "Nombre completo del Target Group para metricas CloudWatch"
    Value: !GetAtt WebAppTargetGroup.TargetGroupFullName
    Export:
      Name: Ecommerce-TG-FullName
  AutoScalingGroupName:
    Description: "Auto Scaling deshabilitado por restricciones del sandbox"
    Value: "AutoScaling disabled in this sandbox"
    Export:
      Name: Ecommerce-ASG-Name
