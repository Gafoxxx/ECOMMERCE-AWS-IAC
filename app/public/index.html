<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi E-Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Mi E-Commerce">
        <img src="/assets/logo.svg" alt="" class="logo-img">
      </a>

      <div class="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path></svg>
        <input id="search-input" type="search" placeholder="Buscar productos" aria-label="Buscar productos">
      </div>

      <nav class="actions" aria-label="Acciones">
        <button id="show-login" class="btn ghost">Ingresar</button>
        <button id="show-register" class="btn outline">Crear cuenta</button>
        <button id="logout" class="btn ghost" hidden>Salir</button>
        <button id="cart-toggle" class="icon-btn cart-btn" aria-label="Ver carrito">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3h2l.5 3m0 0L7 15h10l3-9H5.5Zm3.5 16a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"></path></svg>
          <span id="cart-count" class="badge">0</span>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="store-hero">
      <div class="container hero-inner">
        <div class="hero-copy">
          <p class="eyebrow">E-commerce cloud native</p>
          <h1>Mi E-Commerce</h1>
          <p class="hero-text">Productos esenciales con compra rapida, carrito persistente y pago simulado sobre una arquitectura escalable en AWS.</p>
        </div>
        <div class="hero-panel" aria-label="Resumen de tienda">
          <div>
            <span class="metric-value" id="metric-products">0</span>
            <span class="metric-label">productos</span>
          </div>
          <div>
            <span class="metric-value">24/7</span>
            <span class="metric-label">disponible</span>
          </div>
          <div>
            <span class="metric-value">AWS</span>
            <span class="metric-label">infraestructura</span>
          </div>
        </div>
      </div>
    </section>

    <section class="container catalog-section" aria-labelledby="catalog-title">
      <div class="section-head">
        <div>
          <p class="eyebrow">Catalogo</p>
          <h2 id="catalog-title">Productos destacados</h2>
        </div>
        <div id="result-count" class="result-count">Cargando...</div>
      </div>
      <div id="products" class="product-grid" aria-live="polite"></div>
    </section>
  </main>

  <div id="cart-backdrop" class="drawer-backdrop" aria-hidden="true"></div>
  <aside id="cart-panel" class="cart-panel" aria-hidden="true" aria-label="Carrito de compras">
    <div class="cart-header">
      <div>
        <p class="eyebrow">Checkout</p>
        <h2>Tu carrito</h2>
      </div>
      <button id="close-cart" class="icon-btn" aria-label="Cerrar carrito">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="total"><span>Total</span><strong id="cart-total">$0.00</strong></div>
	      <button id="checkout" class="btn primary full">Continuar al envio</button>
    </div>
  </aside>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <button id="modal-close" class="icon-btn modal-close" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script>
    const API = '/api';

    function getToken(){ return localStorage.getItem('token'); }
    function setToken(t){ localStorage.setItem('token', t); }
    function clearSession(){ localStorage.removeItem('token'); }
    function money(value){
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }
    function escapeHtml(value){
      return String(value || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }
	    function fallbackImage(id){
	      const images = ['audifonos.jpg', 'reloj.jpg', 'mochila.jpg', 'lampara.jpg', 'altavoz.jpg', 'cargador.jpg'];
	      return `/assets/images/${images[((Number(id) || 1) - 1) % images.length]}`;
	    }
	    function findProduct(id){
	      return (window._products || []).find(p => Number(p.id) === Number(id));
	    }

    function showToast(message, type = 'success'){
      const toast = $(`<div class="toast ${type}">${escapeHtml(message)}</div>`);
      $('#toast-root').append(toast);
      setTimeout(() => toast.addClass('show'), 20);
      setTimeout(() => {
        toast.removeClass('show');
        setTimeout(() => toast.remove(), 220);
      }, 3200);
    }

    function setAuthUI(){
      const logged = Boolean(getToken());
      $('#show-login, #show-register').prop('hidden', logged);
      $('#logout').prop('hidden', !logged);
    }

    function handleAuthExpired(){
      clearSession();
      setAuthUI();
      renderCartItems([]);
      $('#cart-items').html('<div class="empty">Tu sesion expiro. Inicia sesion de nuevo.</div>');
      showToast('Tu sesion expiro. Inicia sesion de nuevo.', 'info');
    }

    function renderLoading(){
      $('#products').html(Array.from({ length: 6 }).map(() => `
        <article class="product-card skeleton-card">
          <div class="photo skeleton"></div>
          <div class="product-body">
            <div class="line skeleton"></div>
            <div class="line short skeleton"></div>
            <div class="line tiny skeleton"></div>
          </div>
        </article>
      `).join(''));
    }

    function renderProducts(data){
      const products = data || [];
      $('#metric-products').text(window._products ? window._products.length : products.length);
      $('#result-count').text(products.length === 1 ? '1 producto' : `${products.length} productos`);

      const html = products.map(p => {
        const name = escapeHtml(p.name);
        const desc = escapeHtml((p.description || '').substring(0, 130));
        const img = escapeHtml(p.image || fallbackImage(p.id));
        const stock = p.stock != null ? Number(p.stock) : null;
        const stockClass = stock === 0 ? 'out' : stock <= 10 ? 'low' : '';
        const disabled = stock === 0 ? 'disabled' : '';
	        return `
	          <article class="product-card" data-id="${p.id}">
	            <button class="photo product-preview-trigger" data-id="${p.id}" aria-label="Ver ${name}">
	              <img src="${img}" alt="${name}">
	            </button>
	            <div class="product-body">
	              <div class="product-title-row">
	                <h3 class="product-name">${name}</h3>
	                <span class="stock ${stockClass}">${stock === null ? 'Stock' : stock + ' disp.'}</span>
	              </div>
	              <p class="product-desc">${desc}</p>
	              <div class="product-meta">
	                <div class="price">${money(p.price)}</div>
	                <div class="product-actions">
	                  <button class="btn ghost btn-preview" data-id="${p.id}">Ver</button>
	                  <button class="btn primary btn-add" data-id="${p.id}" ${disabled}>Agregar</button>
	                </div>
	              </div>
	            </div>
	          </article>
	        `;
      }).join('');

      $('#products').html(html || '<div class="empty wide">No encontramos productos con esa busqueda.</div>');
    }

    function loadProducts(){
      renderLoading();
      $.get(API + '/products')
        .done(data => {
          window._products = data || [];
          renderProducts(window._products);
        })
        .fail(() => {
          $('#result-count').text('Sin conexion');
          $('#products').html('<div class="empty wide">No fue posible cargar el catalogo.</div>');
          showToast('No fue posible cargar productos', 'error');
        });
    }

    function normalizeCartResponse(resp){
      if (!resp) return [];
      if (Array.isArray(resp)) return resp;
      if (resp.items) return resp.items;
      return [];
    }

	    function renderCartItems(items){
	      window._cartItems = items || [];
	      if (!items.length) {
	        $('#cart-items').html('<div class="empty">Tu carrito esta vacio.</div>');
	        $('#cart-count').text('0');
	        $('#cart-total').text('$0.00');
	        $('#checkout').prop('disabled', true);
	        return;
	      }

      const html = items.map(i => {
        const product = i.Product || {};
        const productId = i.ProductId || product.id;
        const img = escapeHtml(product.image || fallbackImage(product.id));
        const name = escapeHtml(product.name);
        const quantity = Number(i.quantity || 0);
        const subtotal = quantity * Number(product.price || 0);
        return `
          <div class="cart-row" data-id="${productId}">
            <img src="${img}" alt="${name}">
            <div class="c-body">
              <div class="c-name">${name}</div>
              <div class="c-qty">Cantidad ${quantity}</div>
              <div class="c-sub">${money(subtotal)}</div>
            </div>
            <button class="icon-btn danger remove-item" data-id="${productId}" aria-label="Eliminar ${name}">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"></path></svg>
            </button>
          </div>
        `;
      }).join('');

      $('#cart-items').html(html);
      const total = items.reduce((s,it) => s + (Number(it.quantity || 0) * Number((it.Product && it.Product.price) || 0)), 0);
      const count = items.reduce((s,it) => s + Number(it.quantity || 0), 0);
	      $('#cart-total').text(money(total));
	      $('#cart-count').text(count);
	      $('#checkout').prop('disabled', false);
	    }

    function loadCart(){
      const token = getToken();
      if (!token) {
        renderCartItems([]);
        $('#cart-items').html('<div class="empty">Inicia sesion para guardar tu carrito.</div>');
        return;
      }

      $('#cart-items').html('<div class="empty">Cargando carrito...</div>');
      $.ajax({ url: API + '/cart', headers: { Authorization: 'Bearer ' + token } })
        .done(resp => renderCartItems(normalizeCartResponse(resp)))
        .fail(xhr => {
          if (xhr.status === 401) return handleAuthExpired();
          renderCartItems([]);
          $('#cart-items').html('<div class="empty">No fue posible cargar el carrito.</div>');
          showToast('No fue posible cargar el carrito', 'error');
        });
    }

	    function openModal(html, mode = ''){
	      $('#modal-body').html(html);
	      $('#modal .modal-content').removeClass('wide confirm').addClass(mode);
	      $('#modal').addClass('open').attr('aria-hidden','false');
	      setTimeout(() => $('#modal input:first').trigger('focus'), 80);
	    }

	    function closeModal(){
	      $('#modal').removeClass('open').attr('aria-hidden','true').find('#modal-body').html('');
	      $('#modal .modal-content').removeClass('wide confirm');
	    }

    function openCart(){
      $('#cart-panel').addClass('open').attr('aria-hidden','false');
      $('#cart-backdrop').addClass('open').attr('aria-hidden','false');
      $('body').addClass('drawer-open');
      loadCart();
    }

    function closeCart(){
      $('#cart-panel').removeClass('open').attr('aria-hidden','true');
      $('#cart-backdrop').removeClass('open').attr('aria-hidden','true');
      $('body').removeClass('drawer-open');
    }

	    function authForm(type){
      const isLogin = type === 'login';
      return `
        <div class="auth-form">
          <p class="eyebrow">${isLogin ? 'Acceso' : 'Cuenta nueva'}</p>
          <h3>${isLogin ? 'Ingresar' : 'Crear cuenta'}</h3>
          <label>
            <span>Usuario</span>
            <input id="${isLogin ? 'login' : 'register'}-username" autocomplete="username">
          </label>
          ${isLogin ? '' : `
            <label>
              <span>Email</span>
              <input id="register-email" type="email" autocomplete="email">
            </label>
          `}
          <label>
            <span>Contrasena</span>
            <input id="${isLogin ? 'login' : 'register'}-password" type="password" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
          </label>
          <div class="modal-actions">
            <button id="${isLogin ? 'do-login' : 'do-register'}" class="btn primary">${isLogin ? 'Entrar' : 'Registrar'}</button>
            <button id="modal-cancel" class="btn ghost">Cancelar</button>
          </div>
        </div>
      `;
    }

	    function showLogin(){ openModal(authForm('login')); }
	    function showRegister(){ openModal(authForm('register')); }

	    function productPreview(product){
	      const img = escapeHtml(product.image || fallbackImage(product.id));
	      const name = escapeHtml(product.name);
	      const desc = escapeHtml(product.description || '');
	      const stock = product.stock != null ? Number(product.stock) : null;
	      const stockClass = stock === 0 ? 'out' : stock <= 10 ? 'low' : '';
	      const disabled = stock === 0 ? 'disabled' : '';
	      return `
	        <div class="product-preview">
	          <div class="preview-media">
	            <img src="${img}" alt="${name}">
	          </div>
	          <div class="preview-info">
	            <p class="eyebrow">Detalle del producto</p>
	            <h3>${name}</h3>
	            <p class="preview-desc">${desc}</p>
	            <div class="preview-meta">
	              <div>
	                <span>Precio</span>
	                <strong>${money(product.price)}</strong>
	              </div>
	              <span class="stock ${stockClass}">${stock === null ? 'Stock disponible' : stock + ' disponibles'}</span>
	            </div>
	            <label class="qty-field">
	              <span>Cantidad</span>
	              <input id="preview-qty" type="number" min="1" max="${stock || 99}" value="1" ${disabled}>
	            </label>
	            <div class="modal-actions">
	              <button class="btn primary btn-add-preview" data-id="${product.id}" ${disabled}>Agregar al carrito</button>
	              <button id="modal-cancel" class="btn ghost">Cerrar</button>
	            </div>
	          </div>
	        </div>
	      `;
	    }

	    function showProductPreview(id){
	      const product = findProduct(id);
	      if (product) {
	        openModal(productPreview(product), 'wide');
	        return;
	      }
	      $.get(API + '/products/' + id)
	        .done(p => openModal(productPreview(p), 'wide'))
	        .fail(() => showToast('No fue posible cargar el producto', 'error'));
	    }

	    function addToCart(id, quantity, button){
	      const token = getToken();
	      if (!token) {
	        showLogin();
	        showToast('Inicia sesion para agregar productos', 'info');
	        return;
	      }
	      const originalText = button ? button.text() : '';
	      if (button) button.prop('disabled', true).text('Agregando');
	      $.ajax({
	        url: API + '/cart/add',
	        method: 'POST',
	        headers: { Authorization: 'Bearer ' + token },
	        contentType: 'application/json',
	        data: JSON.stringify({ productId: id, quantity: Number(quantity || 1) })
	      })
	        .done(resp => {
	          renderCartItems(normalizeCartResponse(resp));
	          showToast('Producto agregado al carrito');
	        })
	        .fail(xhr => {
	          if (xhr.status === 401) return handleAuthExpired();
	          showToast('No fue posible agregar el producto', 'error');
	        })
	        .always(() => {
	          if (button) button.prop('disabled', false).text(originalText || 'Agregar');
	        });
	    }

	    function checkoutForm(items){
	      const total = items.reduce((s,it) => s + (Number(it.quantity || 0) * Number((it.Product && it.Product.price) || 0)), 0);
	      const rows = items.map(i => {
	        const product = i.Product || {};
	        const name = escapeHtml(product.name);
	        const quantity = Number(i.quantity || 0);
	        const subtotal = quantity * Number(product.price || 0);
	        return `
	          <div class="summary-row">
	            <span>${name} x ${quantity}</span>
	            <strong>${money(subtotal)}</strong>
	          </div>
	        `;
	      }).join('');
	      return `
	        <form id="shipping-form" class="checkout-form">
	          <div class="checkout-summary">
	            <p class="eyebrow">Resumen</p>
	            <h3>Tu pedido</h3>
	            <div class="summary-list">${rows}</div>
	            <div class="summary-total"><span>Total</span><strong>${money(total)}</strong></div>
	          </div>
	          <div class="shipping-fields">
	            <p class="eyebrow">Envio</p>
	            <h3>Datos de entrega</h3>
	            <label>
	              <span>Nombre completo</span>
	              <input name="shippingName" autocomplete="name" required>
	            </label>
	            <label>
	              <span>Email</span>
	              <input name="shippingEmail" type="email" autocomplete="email" required>
	            </label>
	            <label>
	              <span>Telefono</span>
	              <input name="shippingPhone" autocomplete="tel" required>
	            </label>
	            <label>
	              <span>Direccion</span>
	              <input name="shippingAddress" autocomplete="street-address" required>
	            </label>
	            <label>
	              <span>Ciudad</span>
	              <input name="shippingCity" autocomplete="address-level2" required>
	            </label>
	            <label>
	              <span>Notas de entrega</span>
	              <textarea name="shippingNotes" rows="3"></textarea>
	            </label>
	            <div class="modal-actions">
	              <button id="submit-shipping" class="btn primary" type="submit">Pagar con Mercado Pago</button>
	              <button id="modal-cancel" class="btn ghost" type="button">Cancelar</button>
	            </div>
	          </div>
	        </form>
	      `;
	    }

	    function showCheckout(){
	      const token = getToken();
	      if (!token) return showLogin();
	      if (!window._cartItems || !window._cartItems.length) {
	        showToast('Tu carrito esta vacio', 'info');
	        return;
	      }
	      openModal(checkoutForm(window._cartItems), 'wide');
	    }

	    function orderConfirmation(order){
	      const items = order.items || [];
	      const statusInfo = {
	        paid: { title: 'Pedido confirmado', text: 'Pago aprobado' },
	        pending: { title: 'Pago pendiente', text: 'Estamos esperando la confirmacion del pago' },
	        failed: { title: 'Pago no aprobado', text: 'No fue posible aprobar el pago' },
	        refunded: { title: 'Pago reembolsado', text: 'El pago fue reembolsado' }
	      }[order.status] || { title: 'Estado del pedido', text: order.status || 'Pendiente' };
	      const rows = items.map(item => `
	        <div class="confirm-item">
	          <img src="${escapeHtml(item.productImage || fallbackImage(item.ProductId))}" alt="${escapeHtml(item.productName)}">
	          <div>
	            <strong>${escapeHtml(item.productName)}</strong>
	            <span>Cantidad ${Number(item.quantity || 0)} - ${money(item.unitPrice)}</span>
	          </div>
	          <strong>${money(item.subtotal)}</strong>
	        </div>
	      `).join('');
	      return `
	        <div class="confirmation">
	          <div class="confirm-head">
	            <div class="confirm-mark">
	              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 4 4L19 6"></path></svg>
	            </div>
	            <p class="eyebrow">${statusInfo.text}</p>
	            <h3>Orden #${order.id}</h3>
	            <p>Referencia ${escapeHtml(order.paymentReference)}</p>
	          </div>
	          <div class="confirmation-grid">
	            <section>
	              <h4>Productos</h4>
	              <div class="confirm-list">${rows}</div>
	              <div class="summary-total"><span>Total pagado</span><strong>${money(order.total)}</strong></div>
	            </section>
	            <section>
	              <h4>Entrega</h4>
	              <div class="delivery-card">
	                <strong>${escapeHtml(order.shippingName)}</strong>
	                <span>${escapeHtml(order.shippingAddress)}</span>
	                <span>${escapeHtml(order.shippingCity)}</span>
	                <span>${escapeHtml(order.shippingPhone)}</span>
	                <span>${escapeHtml(order.shippingEmail)}</span>
	                ${order.shippingNotes ? `<span>${escapeHtml(order.shippingNotes)}</span>` : ''}
	              </div>
	              <div class="status-pill">Estado: ${escapeHtml(order.status)}</div>
	            </section>
	          </div>
	          <div class="modal-actions">
	            <button id="modal-cancel" class="btn primary">Volver a la tienda</button>
	          </div>
	        </div>
	      `;
	    }

	    function handlePaymentReturn(){
	      if (!location.pathname.startsWith('/payment/')) return;
	      const token = getToken();
	      const params = new URLSearchParams(location.search);
	      const result = location.pathname.split('/').pop();
	      const title = {
	        success: 'Validando pago...',
	        pending: 'Consultando pago pendiente...',
	        failure: 'Consultando pago...'
	      }[result] || 'Consultando pago...';

	      openModal(`
	        <div class="confirmation">
	          <div class="confirm-head">
	            <p class="eyebrow">Mercado Pago</p>
	            <h3>${title}</h3>
	            <p>Un momento mientras actualizamos tu pedido.</p>
	          </div>
	        </div>
	      `, 'confirm');

	      if (!token) {
	        showToast('Inicia sesion para consultar tu pedido', 'info');
	        showLogin();
	        return;
	      }

	      $.ajax({
	        url: API + '/payments/status?' + params.toString(),
	        headers: { Authorization: 'Bearer ' + token }
	      })
	        .done(res => {
	          openModal(orderConfirmation(res.order), 'confirm');
	          loadCart();
	          loadProducts();
	          history.replaceState({}, document.title, '/');
	        })
	        .fail(xhr => {
	          if (xhr.status === 401) return handleAuthExpired();
	          openModal(`
	            <div class="confirmation">
	              <div class="confirm-head">
	                <p class="eyebrow">Mercado Pago</p>
	                <h3>No pudimos validar el pago</h3>
	                <p>Revisa tu cuenta de Mercado Pago o intenta nuevamente desde el carrito.</p>
	              </div>
	              <div class="modal-actions">
	                <button id="modal-cancel" class="btn primary">Volver a la tienda</button>
	              </div>
	            </div>
	          `, 'confirm');
	        });
	    }

    $(document).on('click', '#cart-toggle', openCart);
    $(document).on('click', '#close-cart, #cart-backdrop', closeCart);
    $(document).on('click', '#modal-close, #modal-cancel', closeModal);
	    $(document).on('click', '#show-login', showLogin);
	    $(document).on('click', '#show-register', showRegister);
	    $(document).on('click', '.btn-preview, .product-preview-trigger', function(){
	      showProductPreview($(this).data('id'));
	    });

    $(document).on('keydown', function(e){
      if (e.key === 'Escape') {
        closeModal();
        closeCart();
      }
    });

	    $(document).on('click', '.btn-add', function(){
	      const id = $(this).data('id');
	      addToCart(id, 1, $(this));
	    });

	    $(document).on('click', '.btn-add-preview', function(){
	      const id = $(this).data('id');
	      const quantity = Number($('#preview-qty').val() || 1);
	      addToCart(id, quantity, $(this));
	    });

    $(document).on('click', '.remove-item', function(){
      const productId = $(this).data('id');
      const token = getToken();
      if (!token) return showLogin();
      $.ajax({ url: API + '/cart/remove', method: 'POST', headers: { Authorization: 'Bearer ' + token }, contentType: 'application/json', data: JSON.stringify({ productId }) })
        .done(resp => {
          renderCartItems(normalizeCartResponse(resp));
          showToast('Producto eliminado');
        })
        .fail(xhr => {
          if (xhr.status === 401) return handleAuthExpired();
          showToast('No fue posible eliminar el producto', 'error');
        });
    });

    $(document).on('click', '#do-register', function(){
      const username = $('#register-username').val();
      const email = $('#register-email').val();
      const password = $('#register-password').val();
      $.post(API + '/auth/register', { username, email, password })
        .done(res => {
          setToken(res.token);
          setAuthUI();
          closeModal();
          loadCart();
          showToast('Cuenta creada correctamente');
        })
        .fail(() => showToast('No fue posible crear la cuenta', 'error'));
    });

    $(document).on('click', '#do-login', function(){
      const username = $('#login-username').val();
      const password = $('#login-password').val();
      $.post(API + '/auth/login', { username, password })
        .done(res => {
          setToken(res.token);
          setAuthUI();
          closeModal();
          loadCart();
          showToast('Sesion iniciada');
        })
        .fail(() => showToast('Credenciales invalidas', 'error'));
    });

    $(document).on('click', '#logout', function(){
      clearSession();
      setAuthUI();
      loadCart();
      showToast('Sesion cerrada', 'info');
    });

	    $(document).on('click', '#checkout', function(){
	      showCheckout();
	    });

	    $(document).on('submit', '#shipping-form', function(e){
	      e.preventDefault();
	      const token = getToken();
	      if (!token) return showLogin();
	      const data = Object.fromEntries(new FormData(this).entries());
	      const button = $('#submit-shipping').prop('disabled', true).text('Conectando');
	      $.ajax({
	        url: API + '/payments/create-preference',
	        method: 'POST',
	        headers: { Authorization: 'Bearer ' + token },
	        contentType: 'application/json',
	        data: JSON.stringify(data)
	      })
	        .done(res => {
	          if (!res.initPoint) {
	            showToast('Mercado Pago no retorno URL de pago', 'error');
	            return;
	          }
	          showToast('Redirigiendo a Mercado Pago', 'info');
	          window.location.href = res.initPoint;
	        })
	        .fail(xhr => {
	          if (xhr.status === 401) return handleAuthExpired();
	          showToast((xhr.responseJSON && xhr.responseJSON.error) || 'No fue posible iniciar el pago', 'error');
	        })
	        .always(() => button.prop('disabled', false).text('Pagar con Mercado Pago'));
	    });

    let searchTimer;
    $(document).on('input', '#search-input', function(){
      clearTimeout(searchTimer);
      const q = $(this).val().trim().toLowerCase();
      searchTimer = setTimeout(() => {
        if (!q) return renderProducts(window._products || []);
        const filtered = (window._products || []).filter(p =>
          (p.name || '').toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q)
        );
        renderProducts(filtered);
      }, 160);
    });

	    $(document).ready(function(){
	      setAuthUI();
	      loadProducts();
	      loadCart();
	      handlePaymentReturn();
	    });
  </script>
</body>
</html>
